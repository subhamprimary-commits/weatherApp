<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-cover bg-center bg-fixed flex items-center justify-center h-screen text-white relative" style="background-image: url(img2.jpg);">

  <!-- Glossy overlay -->
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>

  <div class="bg-white/10 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-[32rem] text-center border border-white/20 relative z-10">

    <!-- Title -->
    <h1 class="text-2xl font-bold mb-4">🌦 Weather App</h1>

    <!-- Input -->
    <input 
      type="text" 
      id="city"
      placeholder="Enter city"
      class="w-full p-2 rounded-lg text-black mb-3 outline-none"
    >

    <!-- Button -->
    <button 
      id="btn"
      class="w-full bg-blue-500 hover:bg-blue-600 p-2 rounded-lg transition"
    >
      Get Weather
    </button>

    <!-- Loading -->
    <p id="loading" class="mt-3 text-yellow-400"></p>

    <!-- Result -->
    <div class="mt-5">
      <h2 id="temp" class="text-3xl font-semibold"></h2>
      <p id="desc" class="text-lg text-gray-300"></p>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
